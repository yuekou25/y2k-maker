<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trình chỉnh ảnh Y2K Pro</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #111; 
            color: #ff00ff; /* Chuyển sang tone màu hồng Y2K */
            text-align: center; 
            padding: 20px; 
        }
        canvas { 
            border: 3px solid #00ffff; /* Viền xanh Cyan */
            margin-top: 20px; 
            max-width: 100%; 
            cursor: crosshair;
        }
        .panel {
            background: #222;
            padding: 15px;
            margin: 10px auto;
            border: 1px solid #ff00ff;
            max-width: 800px;
            border-radius: 10px;
        }
        button, input[type="file"], select { 
            padding: 8px 12px; 
            margin: 5px; 
            font-family: 'Courier New', Courier, monospace; 
            background: #000; 
            color: #00ffff; 
            border: 1px solid #00ffff; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #00ffff; color: #000; }
        .sticker-btn {
            font-size: 20px;
            background: #333;
            border-radius: 5px;
        }
        .sticker-btn.active { background: #ff00ff; }
        h1 { text-shadow: 2px 2px #00ffff; }
    </style>
</head>
<body>

    <h1>✨ Y2K PHOTO EDITOR ✨</h1>
    
    <div class="panel">
        <h3>1. Tải ảnh & Reset</h3>
        <input type="file" id="upload" accept="image/*">
        <button onclick="resetImage()">Khôi phục ảnh gốc</button>
    </div>

    <div class="panel">
        <h3>2. Bộ lọc (Filters)</h3>
        <button onclick="applyPixelate(8)">Rỗ Pixel</button>
        <button onclick="applyGlitch()">Nhiễu VHS (Glitch)</button>
        <button onclick="applyGrayscale()">Trắng Đen</button>
        <br><br>
        <label>🎨 Ép theo Bảng màu Y2K:</label>
        <button onclick="applyPalette()">Cyberpunk/Vaporwave</button>
    </div>

    <div class="panel">
        <h3>3. Dán Sticker (Chọn và Click vào ảnh)</h3>
        <button class="sticker-btn" onclick="selectSticker(this, '🦋')">🦋</button>
        <button class="sticker-btn" onclick="selectSticker(this, '💿')">💿</button>
        <button class="sticker-btn" onclick="selectSticker(this, '💖')">💖</button>
        <button class="sticker-btn" onclick="selectSticker(this, '⭐️')">⭐️</button>
        <button class="sticker-btn" onclick="selectSticker(this, '🍒')">🍒</button>
        <button class="sticker-btn" onclick="selectSticker(this, '')">❌ Tắt dán</button>
    </div>
    
    <canvas id="myCanvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let currentSticker = '';

        // Tải ảnh
        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    resetImage();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Khôi phục ảnh gốc
        function resetImage() {
            if (!img.src) return;
            ctx.drawImage(img, 0, 0);
        }

        // --- CÁC HÀM FILTER ---

        // 1. Pixelate
        function applyPixelate(pixelSize) {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let y = 0; y < canvas.height; y += pixelSize) {
                for (let x = 0; x < canvas.width; x += pixelSize) {
                    const i = (y * canvas.width + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    for (let dy = 0; dy < pixelSize; dy++) {
                        for (let dx = 0; dx < pixelSize; dx++) {
                            if (x + dx < canvas.width && y + dy < canvas.height) {
                                const drawIndex = ((y + dy) * canvas.width + (x + dx)) * 4;
                                data[drawIndex] = r;
                                data[drawIndex+1] = g;
                                data[drawIndex+2] = b;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // 2. VHS Glitch (Tách kênh màu RGB)
        function applyGlitch() {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const shiftPixels = 15; // Xê dịch 15 pixel
            
            // Tạo một bản sao dữ liệu để tham chiếu
            const copyData = new Uint8ClampedArray(data);

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    
                    // Kênh Đỏ (Red) xê dịch sang trái
                    if (x + shiftPixels < canvas.width) {
                        data[i] = copyData[i + shiftPixels * 4]; 
                    }
                    // Kênh Xanh dương (Blue) xê dịch sang phải
                    if (x - shiftPixels >= 0) {
                        data[i + 2] = copyData[i - shiftPixels * 4 + 2];
                    }
                    // Kênh Xanh lá (Green) giữ nguyên
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // 3. Trắng Đen
        function applyGrayscale() {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                // Tính trung bình cộng của R, G, B
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = avg;     // Red
                data[i+1] = avg;   // Green
                data[i+2] = avg;   // Blue
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // 4. Ép Bảng màu (Color Palette Mapping)
        function applyPalette() {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Định nghĩa bảng màu Y2K Vaporwave
            const palette = [
                { r: 255, g: 0, b: 255 },     // Hồng Neon (Magenta)
                { r: 0, g: 255, b: 255 },     // Xanh Cyan
                { r: 128, g: 0, b: 255 },     // Tím đậm
                { r: 255, g: 255, b: 0 },     // Vàng
                { r: 20, g: 20, b: 40 },      // Đen xanh (Dark Navy)
                { r: 255, g: 255, b: 255 }    // Trắng
            ];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                let minDistance = Infinity;
                let closestColor = palette[0];

                // Tìm màu trong bảng màu giống với màu hiện tại nhất (tính khoảng cách Euclid)
                for (let j = 0; j < palette.length; j++) {
                    const p = palette[j];
                    const distance = Math.pow(p.r - r, 2) + Math.pow(p.g - g, 2) + Math.pow(p.b - b, 2);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestColor = p;
                    }
                }

                // Gán màu mới
                data[i] = closestColor.r;
                data[i+1] = closestColor.g;
                data[i+2] = closestColor.b;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // --- CÁC HÀM STICKER ---

        function selectSticker(btn, sticker) {
            currentSticker = sticker;
            // Xóa class active ở các nút khác
            document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
            if(sticker !== '') btn.classList.add('active');
        }

        // Lắng nghe sự kiện click chuột trên canvas để vẽ sticker
        canvas.addEventListener('click', function(e) {
            if (!currentSticker) return; // Nếu chưa chọn sticker thì không làm gì cả
            
            // Lấy tọa độ click chuột chính xác trên canvas
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   
            const scaleY = canvas.height / rect.height;  
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            // Kích thước sticker phụ thuộc vào độ lớn của ảnh
            const fontSize = canvas.width / 15; 
            ctx.font = `${fontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Vẽ emoji lên ảnh
            ctx.fillText(currentSticker, x, y);
        });

    </script>
</body>
</html>
