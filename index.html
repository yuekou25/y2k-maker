<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trình chỉnh ảnh Y2K</title>
    <style>
        body { font-family: monospace; background: #222; color: #0f0; text-align: center; padding: 20px; }
        canvas { border: 2px solid #0f0; margin-top: 20px; max-width: 100%; }
        button, input { padding: 10px; margin: 5px; font-family: monospace; background: #000; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <h1>Trình chỉnh ảnh Y2K</h1>
    
    <input type="file" id="upload" accept="image/*">
    <button onclick="pixelateImage()">Tạo hiệu ứng Pixel</button>
    <br>
    
    <canvas id="myCanvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();

        // Xử lý khi người dùng tải ảnh lên
        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                img.onload = function() {
                    // Chỉnh kích thước canvas vừa với ảnh
                    canvas.width = img.width;
                    canvas.height = img.height;
                    // Vẽ ảnh gốc lên canvas
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Hàm làm rỗ ảnh (Pixelate)
        function pixelateImage() {
            if (!img.src) { alert("Hãy tải ảnh lên trước!"); return; }
            
            const pixelSize = 10; // Đổi số này để hạt pixel to hoặc nhỏ hơn
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let y = 0; y < canvas.height; y += pixelSize) {
                for (let x = 0; x < canvas.width; x += pixelSize) {
                    const i = (y * canvas.width + x) * 4;
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const a = data[i + 3];
                    
                    for (let dy = 0; dy < pixelSize; dy++) {
                        for (let dx = 0; dx < pixelSize; dx++) {
                            if (x + dx < canvas.width && y + dy < canvas.height) {
                                const drawIndex = ((y + dy) * canvas.width + (x + dx)) * 4;
                                data[drawIndex] = r;
                                data[drawIndex + 1] = g;
                                data[drawIndex + 2] = b;
                                data[drawIndex + 3] = a;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }
    </script>
</body>
</html>
