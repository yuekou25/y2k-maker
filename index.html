<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trình chỉnh ảnh Y2K - Bản Hoàn Thiện</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #111; color: #ff99cc; /* Đổi màu chữ chủ đạo sang tone hồng pastel */
            text-align: center; padding: 10px; margin: 0;
        }
        h1 { text-shadow: 2px 2px #fff; margin-bottom: 5px; color: #ff00ff;}
        .toolbar {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            max-width: 1000px; margin: 0 auto;
        }
        .panel {
            background: #222; padding: 10px; border: 1px solid #ff00ff;
            border-radius: 8px; flex: 1 1 300px; text-align: left;
        }
        .panel h3 { margin-top: 0; color: #ff99cc; font-size: 16px; border-bottom: 1px dashed #ff00ff; padding-bottom: 5px;}
        button, input[type="file"], input[type="text"], input[type="range"], select { 
            padding: 6px 10px; margin: 3px; font-family: inherit; 
            background: #000; color: #ff99cc; border: 1px solid #ff99cc; 
            cursor: pointer; font-weight: bold; border-radius: 4px;
        }
        button:hover { background: #ff99cc; color: #000; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; background: #222; }
        .sticker-btn { font-size: 18px; background: #333; border: 1px solid transparent;}
        .active { background: #ff00ff; color: #000; border-color: #fff;}
        .shortcut-hint { font-size: 10px; color: #888; display: block; margin-top: 5px;}
        
        #canvas-container { margin-top: 20px; overflow: auto; max-height: 70vh; }
        canvas { border: 3px solid #ff00ff; background: #000; cursor: crosshair; max-width: 100%; }
        .flex-row { display: flex; align-items: center; font-size: 12px; gap: 5px; margin-top: 5px; flex-wrap: wrap;}
    </style>
</head>
<body>

    <h1>🎀 Y2K PHOTO STUDIO 🎀</h1>
    
    <div class="toolbar">
        <div class="panel">
            <h3>1. Tệp & Lịch sử</h3>
            <input type="file" id="upload" accept="image/*" style="max-width: 200px;">
            <button onclick="downloadImage()">💾 Lưu</button>
            <br>
            <button id="btnUndo" onclick="undo()" disabled>⏪ Undo</button>
            <button id="btnRedo" onclick="redo()" disabled>⏩ Redo</button>
            <button onclick="resetImage()">🔄 Ảnh gốc</button>
            <span class="shortcut-hint">Mẹo: Bấm Ctrl+Z để Undo, Ctrl+Y để Redo (Xóa sticker vừa dán)</span>
        </div>

        <div class="panel">
            <h3>2. Bộ lọc ảnh (Filters)</h3>
            <button onclick="applyPinkTone()">🎀 Tone Hồng Coquette</button>
            <button onclick="applySparkle()">✨ Lấp lánh</button>
            <button onclick="applyGlitch()">📺 Nhiễu VHS</button>
            <button onclick="applyNoise()">📻 Hạt Nhiễu</button>
            <button onclick="applyPixelate(8)">🕹️ Rỗ Pixel</button>
            <br>
            <label style="font-size: 12px; color: #fff;">🎨 Ép màu:</label>
            <button onclick="applyPalette('y2k')">Vaporwave</button>
            <button onclick="applyPalette('gameboy')">GameBoy</button>
        </div>

        <div class="panel">
            <h3>3. Trang trí (Sticker/Chữ)</h3>
            <div style="margin-bottom: 5px;">
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '🎀')">🎀</button>
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '🦋')">🦋</button>
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '💿')">💿</button>
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '🍒')">🍒</button>
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '🩹')">🩹</button>
                <button class="sticker-btn" onclick="selectTool(this, 'sticker', '✨')">✨</button>
                <button onclick="selectTool(this, 'none')">❌ Tắt</button>
            </div>
            
            <div class="flex-row">
                <label>Kích cỡ:</label>
                <input type="range" id="stickerSize" min="20" max="200" value="60">
            </div>

            <div class="flex-row" style="margin-top: 10px; border-top: 1px dashed #555; padding-top: 5px;">
                <input type="text" id="textInput" placeholder="Nhập chữ..." style="width: 100px;">
                <button id="btnText" onclick="selectTool(this, 'text')">Chữ</button>
                <button id="btnBubble" onclick="selectTool(this, 'bubble')">Khung</button>
                
                <select id="stickerEffect">
                    <option value="none">Hiệu ứng dán: Gốc</option>
                    <option value="neon">Phát sáng Neon</option>
                    <option value="shadow">Đổ bóng đen</option>
                    <option value="blur">Mờ ảo</option>
                </select>
            </div>
        </div>
    </div>
    
    <div id="canvas-container">
        <canvas id="myCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        
        let currentMode = 'none'; 
        let currentSticker = '';
        let history = [];
        let historyStep = -1;
        const maxHistory = 20; // Tăng giới hạn Undo lên 20 bước

        // --- LẮNG NGHE PHÍM TẮT (KEYBOARD SHORTCUTS) ---
        document.addEventListener('keydown', function(e) {
            // Ngăn chặn hành vi mặc định nếu lỡ bấm khi đang nhập text
            if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;

            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undo();
            }
            if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) {
                e.preventDefault();
                redo();
            }
        });

        // Tải ảnh
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    history = []; historyStep = -1; saveState();
                }
                img.src = event.target.result;
            }
            if(file) reader.readAsDataURL(file);
        });

        function saveState() {
            historyStep++;
            if (historyStep < history.length) history.length = historyStep;
            history.push(canvas.toDataURL("image/png"));
            if (history.length > maxHistory) { history.shift(); historyStep--; }
            updateUndoRedoButtons();
        }

        function undo() { if (historyStep > 0) { historyStep--; restoreState(); } }
        function redo() { if (historyStep < history.length - 1) { historyStep++; restoreState(); } }

        function restoreState() {
            let imgState = new Image();
            imgState.onload = function() {
                canvas.width = imgState.width; canvas.height = imgState.height;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(imgState, 0, 0);
                updateUndoRedoButtons();
            }
            imgState.src = history[historyStep];
        }

        function updateUndoRedoButtons() {
            document.getElementById('btnUndo').disabled = (historyStep <= 0);
            document.getElementById('btnRedo').disabled = (historyStep >= history.length - 1);
        }

        function resetImage() {
            if (!img.src) return;
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0); saveState();
        }

        function downloadImage() {
            if (!img.src) return;
            const link = document.createElement('a');
            link.download = 'y2k_aesthetic.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // --- CÁC HÀM FILTER MỚI ---

        // Tone Hồng Coquette: Tăng kênh Red, giảm kênh Green, tăng nhẹ kênh Blue
        function applyPinkTone() {
            processPixels((data, i) => {
                data[i] = Math.min(255, data[i] * 1.2 + 20);     // Red
                data[i+1] = data[i+1] * 0.85;                    // Green
                data[i+2] = Math.min(255, data[i+2] * 1.1 + 10); // Blue
            });
        }

        // Hiệu ứng Lấp lánh (Sparkle/Glitter): Biến các pixel ngẫu nhiên thành màu trắng sáng
        function applySparkle() {
            processPixels((data, i) => {
                if (Math.random() < 0.04) { // 4% số pixel trên ảnh sẽ phát sáng
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255; 
                }
            });
        }

        function applyNoise() {
            processPixels((data, i) => {
                const noise = (Math.random() - 0.5) * 60;
                data[i] += noise; data[i+1] += noise; data[i+2] += noise;
            });
        }

        function applyPixelate(pixelSize) {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let y = 0; y < canvas.height; y += pixelSize) {
                for (let x = 0; x < canvas.width; x += pixelSize) {
                    const i = (y * canvas.width + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    for (let dy = 0; dy < pixelSize; dy++) {
                        for (let dx = 0; dx < pixelSize; dx++) {
                            if (x + dx < canvas.width && y + dy < canvas.height) {
                                const drawIndex = ((y + dy) * canvas.width + (x + dx)) * 4;
                                data[drawIndex] = r; data[drawIndex+1] = g; data[drawIndex+2] = b;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0); saveState();
        }

        function applyGlitch() {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const shiftPixels = 20;
            const copyData = new Uint8ClampedArray(data);
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if (x + shiftPixels < canvas.width) data[i] = copyData[i + shiftPixels * 4]; 
                    if (x - shiftPixels >= 0) data[i + 2] = copyData[i - shiftPixels * 4 + 2];
                }
            }
            ctx.putImageData(imageData, 0, 0); saveState();
        }

        function applyPalette(type) {
            const palettes = {
                y2k: [{r: 255, g: 153, b: 204}, {r: 0, g: 255, b: 255}, {r: 128, g: 0, b: 255}, {r: 20, g: 20, b: 40}, {r: 255, g: 255, b: 255}],
                gameboy: [{r: 15, g: 56, b: 15}, {r: 48, g: 98, b: 48}, {r: 139, g: 172, b: 15}, {r: 155, g: 188, b: 15}]
            };
            const pal = palettes[type];
            processPixels((data, i) => {
                const r = data[i], g = data[i+1], b = data[i+2];
                let minDist = Infinity, closest = pal[0];
                for (let j = 0; j < pal.length; j++) {
                    const dist = Math.pow(pal[j].r - r, 2) + Math.pow(pal[j].g - g, 2) + Math.pow(pal[j].b - b, 2);
                    if (dist < minDist) { minDist = dist; closest = pal[j]; }
                }
                data[i] = closest.r; data[i+1] = closest.g; data[i+2] = closest.b;
            });
        }

        function processPixels(logicCallback) {
            if (!img.src) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < imageData.data.length; i += 4) { logicCallback(imageData.data, i); }
            ctx.putImageData(imageData, 0, 0); saveState();
        }

        // --- CÔNG CỤ TƯƠNG TÁC (CÓ THÊM FILTER RIÊNG CHO STICKER) ---

        function selectTool(btn, mode, stickerVal = '') {
            currentMode = mode; currentSticker = stickerVal;
            document.querySelectorAll('.sticker-btn, #btnText, #btnBubble').forEach(b => b.classList.remove('active'));
            if(mode !== 'none') btn.classList.add('active');
        }

        canvas.addEventListener('click', function(e) {
            if (currentMode === 'none' || !img.src) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   
            const scaleY = canvas.height / rect.height;  
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            const size = document.getElementById('stickerSize').value;
            const textValue = document.getElementById('textInput').value || "Y2K";
            const effect = document.getElementById('stickerEffect').value;

            // LƯU Ý KỸ THUẬT: ctx.save() lưu trạng thái cọ vẽ để filter chỉ áp dụng cho nét vẽ tiếp theo
            ctx.save(); 

            // Áp dụng Filter riêng cho Sticker / Text
            if (effect === 'neon') {
                ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 20;
            } else if (effect === 'shadow') {
                ctx.shadowColor = '#000000'; ctx.shadowBlur = 5; ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
            } else if (effect === 'blur') {
                ctx.filter = 'blur(4px)'; // CSS Filter áp dụng trực tiếp lên Canvas API
            }

            if (currentMode === 'sticker') {
                ctx.font = `${size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(currentSticker, x, y);
            } 
            else if (currentMode === 'text') {
                ctx.font = `bold ${size}px 'Courier New'`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillStyle = "#ff99cc"; ctx.strokeStyle = "#fff"; ctx.lineWidth = size / 15;
                ctx.strokeText(textValue, x, y); ctx.fillText(textValue, x, y);
            }
            else if (currentMode === 'bubble') {
                ctx.font = `bold ${size/2}px 'Courier New'`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                const textMetrics = ctx.measureText(textValue);
                const padding = parseInt(size) / 2;
                const rectW = textMetrics.width + padding * 2; const rectH = parseInt(size) + padding;
                
                ctx.fillStyle = "#fff"; ctx.strokeStyle = "#ff00ff"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.roundRect(x - rectW/2, y - rectH/2, rectW, rectH, 15); ctx.fill(); ctx.stroke();
                
                ctx.beginPath(); ctx.moveTo(x, y + rectH/2); ctx.lineTo(x - 10, y + rectH/2 + 15); ctx.lineTo(x + 10, y + rectH/2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#000"; ctx.fillText(textValue, x, y);
            }

            // Xóa bộ lọc cọ vẽ để không ảnh hưởng đến các lần vẽ sau
            ctx.restore(); 
            saveState(); 
        });

    </script>
</body>
</html>
